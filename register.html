    <main>
      <section class="section4">
        <form method="get">
          <fieldset>
            <h1>Register With Email Address</h1>
            <div class="set-content">
              <label for="email"><p>Your Email Address*</p></label>
              <input
                type="text"
                name="EmailAdd"
                id="EmailAdd"
                placeholder="Enter your email"
                autocomplete="on"
                required
                autofocus
              />
              <i class="bx bxs-envelope"></i>
            </div>
            <div class="set-content">
              <label for="email"><p>Repeat Your Email Address*</p></label>
              <input
                type="email"
                placeholder="Enter your email"
                required
                autofocus
                autocomplete="on"
              />
              <i class="bx bxs-envelope"></i>
            </div>
            <div class="set-content">
              <label for="password"><p>Your Password*</p></label>
              <input
                type="password"
                name="Password"
                id="Password"
                placeholder="Enter password"
                autocomplete="on"
                required
                autofocus
              /><i class="bx bxs-lock-alt"></i>
            </div>
            <div class="set-content">
              <label for="password"><p>Repeat Your Password*</p></label>
              <input
                type="password"
                name="Password"
                id="RepeatPassword"
                placeholder="Enter password"
                autocomplete="on"
                required
                autofocus
              /><i class="bx bxs-lock-alt"></i>
            </div>
            <button type="submit">Create your account</button>
          </fieldset>
        </form>
